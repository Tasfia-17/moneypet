<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a3e"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#5934FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#5934FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#5934FF" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)" stroke="#5934FF" stroke-width="2"/>
  <circle cx="100" cy="100" r="96" fill="url(#glow)"/>

  <!-- ESP32 board body -->
  <rect x="55" y="70" width="90" height="60" rx="4" fill="#141414" stroke="#2A2A2A" stroke-width="1.5"/>
  <!-- Board pins left -->
  <rect x="48" y="76" width="7" height="3" rx="1" fill="#9E9E9E"/>
  <rect x="48" y="83" width="7" height="3" rx="1" fill="#9E9E9E"/>
  <rect x="48" y="90" width="7" height="3" rx="1" fill="#9E9E9E"/>
  <rect x="48" y="97" width="7" height="3" rx="1" fill="#9E9E9E"/>
  <rect x="48" y="104" width="7" height="3" rx="1" fill="#9E9E9E"/>
  <rect x="48" y="111" width="7" height="3" rx="1" fill="#9E9E9E"/>
  <rect x="48" y="118" width="7" height="3" rx="1" fill="#9E9E9E"/>
  <!-- Board pins right -->
  <rect x="145" y="76" width="7" height="3" rx="1" fill="#9E9E9E"/>
  <rect x="145" y="83" width="7" height="3" rx="1" fill="#9E9E9E"/>
  <rect x="145" y="90" width="7" height="3" rx="1" fill="#9E9E9E"/>
  <rect x="145" y="97" width="7" height="3" rx="1" fill="#9E9E9E"/>
  <rect x="145" y="104" width="7" height="3" rx="1" fill="#9E9E9E"/>
  <rect x="145" y="111" width="7" height="3" rx="1" fill="#9E9E9E"/>
  <rect x="145" y="118" width="7" height="3" rx="1" fill="#9E9E9E"/>

  <!-- LCD screen on board -->
  <rect x="62" y="76" width="50" height="34" rx="2" fill="#050505" stroke="#5934FF" stroke-width="1"/>
  <!-- Screen content: pet face -->
  <text x="87" y="98" font-size="18" text-anchor="middle" fill="#5934FF" filter="url(#shadow)">🙂</text>

  <!-- Chip -->
  <rect x="118" y="80" width="22" height="22" rx="2" fill="#1E1E1E" stroke="#444" stroke-width="1"/>
  <text x="129" y="95" font-size="7" text-anchor="middle" fill="#9E9E9E" font-family="monospace">ESP32</text>
  <!-- Chip pins -->
  <line x1="118" y1="84" x2="114" y2="84" stroke="#555" stroke-width="1"/>
  <line x1="118" y1="88" x2="114" y2="88" stroke="#555" stroke-width="1"/>
  <line x1="118" y1="92" x2="114" y2="92" stroke="#555" stroke-width="1"/>
  <line x1="140" y1="84" x2="144" y2="84" stroke="#555" stroke-width="1"/>
  <line x1="140" y1="88" x2="144" y2="88" stroke="#555" stroke-width="1"/>
  <line x1="140" y1="92" x2="144" y2="92" stroke="#555" stroke-width="1"/>

  <!-- USB port -->
  <rect x="88" y="128" width="14" height="6" rx="1" fill="#333" stroke="#555" stroke-width="1"/>

  <!-- USDC coin floating above -->
  <circle cx="100" cy="48" r="16" fill="#0052FF" stroke="#5934FF" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="53" font-size="11" text-anchor="middle" fill="white" font-weight="bold" font-family="monospace">$</text>

  <!-- Connecting line from coin to board -->
  <line x1="100" y1="64" x2="100" y2="70" stroke="#5934FF" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- WiFi waves -->
  <path d="M 72 155 Q 100 148 128 155" fill="none" stroke="#5934FF" stroke-width="1.5" opacity="0.4"/>
  <path d="M 80 162 Q 100 157 120 162" fill="none" stroke="#5934FF" stroke-width="1.5" opacity="0.6"/>
  <path d="M 88 169 Q 100 165 112 169" fill="none" stroke="#5934FF" stroke-width="1.5" opacity="0.9"/>
  <circle cx="100" cy="173" r="2" fill="#5934FF"/>

  <!-- Text -->
  <text x="100" y="192" font-size="9" text-anchor="middle" fill="#5934FF" font-family="monospace" letter-spacing="3">MONEYPET</text>
</svg>
