<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320" font-family="'Courier New', monospace">
  <rect width="800" height="320" fill="#0A0A0A"/>
  <text x="400" y="28" font-size="11" fill="#5934FF" text-anchor="middle" letter-spacing="3">LOCUS PAYMENT FLOW</text>
  <line x1="40" y1="38" x2="760" y2="38" stroke="#2A2A2A" stroke-width="1"/>

  <!-- Nodes -->
  <!-- User -->
  <rect x="30" y="120" width="90" height="50" rx="3" fill="#141414" stroke="#9E9E9E" stroke-width="1"/>
  <text x="75" y="141" font-size="9" fill="#9E9E9E" text-anchor="middle">USER</text>
  <text x="75" y="155" font-size="8" fill="#555" text-anchor="middle">voice / text</text>
  <text x="75" y="165" font-size="8" fill="#555" text-anchor="middle">command</text>

  <!-- Device -->
  <rect x="170" y="100" width="100" height="90" rx="3" fill="#141414" stroke="#5934FF" stroke-width="1.5"/>
  <text x="220" y="120" font-size="9" fill="#5934FF" text-anchor="middle">DEVICE</text>
  <text x="220" y="134" font-size="8" fill="#9E9E9E" text-anchor="middle">ESP32 sim</text>
  <text x="220" y="148" font-size="8" fill="#9E9E9E" text-anchor="middle">320x240 LCD</text>
  <text x="220" y="162" font-size="8" fill="#9E9E9E" text-anchor="middle">21 emotions</text>
  <text x="220" y="176" font-size="8" fill="#9E9E9E" text-anchor="middle">state machine</text>

  <!-- Backend -->
  <rect x="320" y="100" width="110" height="90" rx="3" fill="#141414" stroke="#00C853" stroke-width="1.5"/>
  <text x="375" y="120" font-size="9" fill="#00C853" text-anchor="middle">BACKEND</text>
  <text x="375" y="134" font-size="8" fill="#9E9E9E" text-anchor="middle">FastAPI</text>
  <text x="375" y="148" font-size="8" fill="#9E9E9E" text-anchor="middle">intent parser</text>
  <text x="375" y="162" font-size="8" fill="#9E9E9E" text-anchor="middle">pet logic</text>
  <text x="375" y="176" font-size="8" fill="#9E9E9E" text-anchor="middle">plugin registry</text>

  <!-- Locus -->
  <rect x="480" y="80" width="120" height="130" rx="3" fill="#0d0d0d" stroke="#5934FF" stroke-width="2"/>
  <text x="540" y="102" font-size="9" fill="#5934FF" text-anchor="middle">LOCUS API</text>
  <line x1="480" y1="108" x2="600" y2="108" stroke="#5934FF" stroke-width="0.5" opacity="0.4"/>
  <text x="540" y="122" font-size="8" fill="#9E9E9E" text-anchor="middle">wallet balance</text>
  <text x="540" y="134" font-size="8" fill="#9E9E9E" text-anchor="middle">wrapped APIs</text>
  <text x="540" y="146" font-size="8" fill="#9E9E9E" text-anchor="middle">checkout sessions</text>
  <text x="540" y="158" font-size="8" fill="#9E9E9E" text-anchor="middle">USDC transfers</text>
  <text x="540" y="170" font-size="8" fill="#9E9E9E" text-anchor="middle">spending controls</text>
  <text x="540" y="182" font-size="8" fill="#9E9E9E" text-anchor="middle">billboard (MPP)</text>
  <text x="540" y="194" font-size="8" fill="#9E9E9E" text-anchor="middle">audit trail</text>

  <!-- Base chain -->
  <rect x="650" y="120" width="110" height="50" rx="3" fill="#141414" stroke="#0052FF" stroke-width="1.5"/>
  <text x="705" y="140" font-size="9" fill="#0052FF" text-anchor="middle">BASE CHAIN</text>
  <text x="705" y="154" font-size="8" fill="#9E9E9E" text-anchor="middle">USDC settlement</text>
  <text x="705" y="164" font-size="8" fill="#9E9E9E" text-anchor="middle">on-chain txs</text>

  <!-- Arrows -->
  <defs>
    <marker id="a1" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#9E9E9E"/>
    </marker>
    <marker id="a2" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#5934FF"/>
    </marker>
    <marker id="a3" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#0052FF"/>
    </marker>
  </defs>

  <line x1="120" y1="145" x2="168" y2="145" stroke="#9E9E9E" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="270" y1="145" x2="318" y2="145" stroke="#5934FF" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="430" y1="145" x2="478" y2="145" stroke="#5934FF" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="600" y1="145" x2="648" y2="145" stroke="#0052FF" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- Return arrows (below) -->
  <line x1="318" y1="175" x2="270" y2="175" stroke="#00C853" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#a1)"/>
  <text x="294" y="190" font-size="7" fill="#00C853" text-anchor="middle">reply + emotion</text>

  <line x1="478" y1="175" x2="430" y2="175" stroke="#5934FF" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#a2)"/>
  <text x="454" y="190" font-size="7" fill="#5934FF" text-anchor="middle">data + cost</text>

  <!-- Step labels -->
  <text x="144" y="135" font-size="7" fill="#555" text-anchor="middle">1</text>
  <text x="294" y="135" font-size="7" fill="#555" text-anchor="middle">2</text>
  <text x="454" y="135" font-size="7" fill="#555" text-anchor="middle">3</text>
  <text x="624" y="135" font-size="7" fill="#555" text-anchor="middle">4</text>

  <!-- Flow description -->
  <text x="400" y="240" font-size="8" fill="#444" text-anchor="middle">1. User speaks command to device</text>
  <text x="400" y="255" font-size="8" fill="#444" text-anchor="middle">2. Device sends to backend via WebSocket / REST</text>
  <text x="400" y="270" font-size="8" fill="#444" text-anchor="middle">3. Backend calls Locus API, USDC deducted from agent wallet</text>
  <text x="400" y="285" font-size="8" fill="#444" text-anchor="middle">4. Locus settles payment on Base chain, returns data</text>
  <text x="400" y="300" font-size="8" fill="#5934FF" text-anchor="middle">Every API call is a real on-chain USDC transaction</text>
</svg>
