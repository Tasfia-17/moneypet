<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" font-family="'Courier New', monospace">
  <rect width="900" height="500" fill="#0A0A0A"/>

  <!-- Title -->
  <text x="450" y="32" font-size="13" fill="#5934FF" text-anchor="middle" letter-spacing="3">MONEYPET SYSTEM ARCHITECTURE</text>
  <line x1="50" y1="42" x2="850" y2="42" stroke="#2A2A2A" stroke-width="1"/>

  <!-- LAYER 1: Hardware (left) -->
  <rect x="30" y="60" width="180" height="380" rx="4" fill="#0d0d0d" stroke="#2A2A2A" stroke-width="1"/>
  <text x="120" y="82" font-size="9" fill="#9E9E9E" text-anchor="middle" letter-spacing="2">HARDWARE LAYER</text>
  <line x1="30" y1="88" x2="210" y2="88" stroke="#2A2A2A" stroke-width="1"/>

  <!-- ESP32 box -->
  <rect x="45" y="100" width="150" height="80" rx="3" fill="#141414" stroke="#5934FF" stroke-width="1.5"/>
  <text x="120" y="118" font-size="9" fill="#5934FF" text-anchor="middle">ESP32-S3</text>
  <text x="120" y="132" font-size="8" fill="#9E9E9E" text-anchor="middle">320x240 LCD Display</text>
  <text x="120" y="144" font-size="8" fill="#9E9E9E" text-anchor="middle">Microphone + Speaker</text>
  <text x="120" y="156" font-size="8" fill="#9E9E9E" text-anchor="middle">Joystick + Buttons</text>
  <text x="120" y="168" font-size="8" fill="#9E9E9E" text-anchor="middle">WiFi + BLE</text>

  <!-- Simulator box -->
  <rect x="45" y="195" width="150" height="50" rx="3" fill="#141414" stroke="#627EEA" stroke-width="1"/>
  <text x="120" y="213" font-size="9" fill="#627EEA" text-anchor="middle">DESKTOP SIMULATOR</text>
  <text x="120" y="227" font-size="8" fill="#9E9E9E" text-anchor="middle">Browser (320x240 px)</text>
  <text x="120" y="239" font-size="8" fill="#9E9E9E" text-anchor="middle">Web Speech API</text>

  <!-- LVGL screens -->
  <rect x="45" y="260" width="150" height="80" rx="3" fill="#141414" stroke="#444" stroke-width="1"/>
  <text x="120" y="278" font-size="9" fill="#9E9E9E" text-anchor="middle">SCREEN SYSTEM</text>
  <text x="120" y="292" font-size="8" fill="#555" text-anchor="middle">PET screen (emotions)</text>
  <text x="120" y="304" font-size="8" fill="#555" text-anchor="middle">FEED screen (market)</text>
  <text x="120" y="316" font-size="8" fill="#555" text-anchor="middle">WALLET screen (P&amp;L)</text>
  <text x="120" y="328" font-size="8" fill="#555" text-anchor="middle">EARN screen (checkout)</text>

  <!-- Inspired by -->
  <rect x="45" y="355" width="150" height="60" rx="3" fill="#0d0d0d" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="120" y="373" font-size="8" fill="#444" text-anchor="middle">Inspired by</text>
  <text x="120" y="385" font-size="8" fill="#444" text-anchor="middle">ava-trading-esp32</text>
  <text x="120" y="397" font-size="8" fill="#444" text-anchor="middle">xiaozhi-esp32</text>
  <text x="120" y="409" font-size="8" fill="#444" text-anchor="middle">TamaFi + ElatoAI</text>

  <!-- Arrow HW to Backend -->
  <line x1="210" y1="250" x2="290" y2="250" stroke="#5934FF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="250" y="244" font-size="7" fill="#5934FF" text-anchor="middle">WebSocket</text>
  <text x="250" y="258" font-size="7" fill="#5934FF" text-anchor="middle">SSE / REST</text>

  <!-- LAYER 2: Backend (center) -->
  <rect x="290" y="60" width="200" height="380" rx="4" fill="#0d0d0d" stroke="#2A2A2A" stroke-width="1"/>
  <text x="390" y="82" font-size="9" fill="#9E9E9E" text-anchor="middle" letter-spacing="2">BACKEND LAYER</text>
  <line x1="290" y1="88" x2="490" y2="88" stroke="#2A2A2A" stroke-width="1"/>

  <!-- FastAPI -->
  <rect x="305" y="100" width="170" height="50" rx="3" fill="#141414" stroke="#00C853" stroke-width="1.5"/>
  <text x="390" y="118" font-size="9" fill="#00C853" text-anchor="middle">FastAPI SERVER</text>
  <text x="390" y="132" font-size="8" fill="#9E9E9E" text-anchor="middle">REST + SSE endpoints</text>
  <text x="390" y="144" font-size="8" fill="#9E9E9E" text-anchor="middle">Device state machine</text>

  <!-- Pet state machine -->
  <rect x="305" y="165" width="170" height="70" rx="3" fill="#141414" stroke="#FF6D00" stroke-width="1"/>
  <text x="390" y="183" font-size="9" fill="#FF6D00" text-anchor="middle">PET STATE MACHINE</text>
  <text x="390" y="197" font-size="8" fill="#9E9E9E" text-anchor="middle">hunger / happiness / health</text>
  <text x="390" y="209" font-size="8" fill="#9E9E9E" text-anchor="middle">stage evolution (baby-elder)</text>
  <text x="390" y="221" font-size="8" fill="#9E9E9E" text-anchor="middle">21 emotion system</text>
  <text x="390" y="233" font-size="8" fill="#9E9E9E" text-anchor="middle">TamaFi stat decay logic</text>

  <!-- Agent / intent -->
  <rect x="305" y="250" width="170" height="70" rx="3" fill="#141414" stroke="#627EEA" stroke-width="1"/>
  <text x="390" y="268" font-size="9" fill="#627EEA" text-anchor="middle">RULE-BASED AGENT</text>
  <text x="390" y="282" font-size="8" fill="#9E9E9E" text-anchor="middle">Intent detection (regex)</text>
  <text x="390" y="294" font-size="8" fill="#9E9E9E" text-anchor="middle">Plugin registry (@tool)</text>
  <text x="390" y="306" font-size="8" fill="#9E9E9E" text-anchor="middle">xiaozhi MCP pattern</text>
  <text x="390" y="318" font-size="8" fill="#9E9E9E" text-anchor="middle">No LLM required</text>

  <!-- Voice -->
  <rect x="305" y="335" width="170" height="40" rx="3" fill="#141414" stroke="#444" stroke-width="1"/>
  <text x="390" y="353" font-size="9" fill="#9E9E9E" text-anchor="middle">VOICE PIPELINE</text>
  <text x="390" y="367" font-size="8" fill="#555" text-anchor="middle">Web Speech API (browser)</text>

  <!-- Arrow Backend to Locus -->
  <line x1="490" y1="250" x2="570" y2="250" stroke="#5934FF" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="530" y="244" font-size="7" fill="#5934FF" text-anchor="middle">HTTPS</text>
  <text x="530" y="258" font-size="7" fill="#5934FF" text-anchor="middle">Bearer token</text>

  <!-- LAYER 3: Locus (right center) -->
  <rect x="570" y="60" width="200" height="380" rx="4" fill="#0d0d0d" stroke="#5934FF" stroke-width="2"/>
  <text x="670" y="82" font-size="9" fill="#5934FF" text-anchor="middle" letter-spacing="2">LOCUS PAYMENT LAYER</text>
  <line x1="570" y1="88" x2="770" y2="88" stroke="#5934FF" stroke-width="1" opacity="0.5"/>

  <!-- Wallet -->
  <rect x="585" y="100" width="170" height="55" rx="3" fill="#141414" stroke="#5934FF" stroke-width="1.5"/>
  <text x="670" y="118" font-size="9" fill="#5934FF" text-anchor="middle">AGENT WALLET</text>
  <text x="670" y="132" font-size="8" fill="#9E9E9E" text-anchor="middle">Non-custodial USDC on Base</text>
  <text x="670" y="144" font-size="8" fill="#9E9E9E" text-anchor="middle">Self-registration (no signup)</text>
  <text x="670" y="154" font-size="8" fill="#9E9E9E" text-anchor="middle">$14.20 USDC live balance</text>

  <!-- Wrapped APIs -->
  <rect x="585" y="168" width="170" height="100" rx="3" fill="#141414" stroke="#627EEA" stroke-width="1"/>
  <text x="670" y="186" font-size="9" fill="#627EEA" text-anchor="middle">WRAPPED APIs (pay-per-use)</text>
  <text x="670" y="200" font-size="8" fill="#9E9E9E" text-anchor="middle">CoinGecko  $0.06/call</text>
  <text x="670" y="212" font-size="8" fill="#9E9E9E" text-anchor="middle">Alpha Vantage  $0.008/call</text>
  <text x="670" y="224" font-size="8" fill="#9E9E9E" text-anchor="middle">Wolfram Alpha  $0.055/call</text>
  <text x="670" y="236" font-size="8" fill="#9E9E9E" text-anchor="middle">Brave Search  $0.035/call</text>
  <text x="670" y="248" font-size="8" fill="#9E9E9E" text-anchor="middle">Perplexity  $0.005/call</text>
  <text x="670" y="260" font-size="8" fill="#9E9E9E" text-anchor="middle">44+ providers available</text>

  <!-- Checkout -->
  <rect x="585" y="280" width="170" height="50" rx="3" fill="#141414" stroke="#00C853" stroke-width="1"/>
  <text x="670" y="298" font-size="9" fill="#00C853" text-anchor="middle">LOCUS CHECKOUT</text>
  <text x="670" y="312" font-size="8" fill="#9E9E9E" text-anchor="middle">Pet earns USDC from humans</text>
  <text x="670" y="324" font-size="8" fill="#9E9E9E" text-anchor="middle">Agent-native payment flow</text>

  <!-- Billboard -->
  <rect x="585" y="342" width="170" height="40" rx="3" fill="#141414" stroke="#FF6D00" stroke-width="1"/>
  <text x="670" y="360" font-size="9" fill="#FF6D00" text-anchor="middle">BILLBOARD (MPP)</text>
  <text x="670" y="374" font-size="8" fill="#9E9E9E" text-anchor="middle">Post to X via HTTP 402</text>

  <!-- Spending controls -->
  <rect x="585" y="394" width="170" height="30" rx="3" fill="#141414" stroke="#444" stroke-width="1"/>
  <text x="670" y="412" font-size="8" fill="#9E9E9E" text-anchor="middle">Spending controls + audit trail</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5934FF"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5934FF"/>
    </marker>
  </defs>

  <!-- Base chain label -->
  <rect x="780" y="160" width="100" height="60" rx="3" fill="#0d0d0d" stroke="#0052FF" stroke-width="1"/>
  <text x="830" y="183" font-size="9" fill="#0052FF" text-anchor="middle">BASE CHAIN</text>
  <text x="830" y="197" font-size="8" fill="#9E9E9E" text-anchor="middle">USDC settlement</text>
  <text x="830" y="209" font-size="8" fill="#9E9E9E" text-anchor="middle">18 txs confirmed</text>
  <line x1="770" y1="190" x2="780" y2="190" stroke="#0052FF" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Bottom legend -->
  <line x1="50" y1="458" x2="850" y2="458" stroke="#2A2A2A" stroke-width="1"/>
  <rect x="60" y="466" width="10" height="10" fill="none" stroke="#5934FF" stroke-width="1.5"/>
  <text x="76" y="475" font-size="8" fill="#9E9E9E">Locus integration</text>
  <rect x="180" y="466" width="10" height="10" fill="none" stroke="#00C853" stroke-width="1.5"/>
  <text x="196" y="475" font-size="8" fill="#9E9E9E">Core logic</text>
  <rect x="280" y="466" width="10" height="10" fill="none" stroke="#627EEA" stroke-width="1.5"/>
  <text x="296" y="475" font-size="8" fill="#9E9E9E">Data flow</text>
  <rect x="380" y="466" width="10" height="10" fill="none" stroke="#FF6D00" stroke-width="1.5"/>
  <text x="396" y="475" font-size="8" fill="#9E9E9E">Pet state</text>
  <text x="830" y="475" font-size="8" fill="#444" text-anchor="middle">Locus Paygentic Hackathon 2026</text>
</svg>
